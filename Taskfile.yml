version: '3'

dotenv: ['.env']

vars:
  IMAGE: ghcr.io/shyndman/sleeper:dev

tasks:
  deploy:
    desc: Build the image, push :dev to ghcr, and roll the remote compose stack
    requires:
      vars: [DEPLOY_DEV_HOST, DEPLOY_DEV_PATH]
    cmds:
      - |
        set -e
        gpgconf --kill gpg-agent
        export GPG_TTY="$(tty)"
        docker build --file docker/Dockerfile --tag {{.IMAGE}} .
        docker push {{.IMAGE}}
      # DEPLOY_DEV_PATH stays inside the single quotes so a leading ~ is
      # expanded by the remote shell, not locally.
      - scp ./.env {{.DEPLOY_DEV_HOST}}:{{.DEPLOY_DEV_PATH}}
      - kitten ssh {{.DEPLOY_DEV_HOST}} "zsh -l -c 'cd {{.DEPLOY_DEV_PATH}} && docker compose pull && op run -- docker compose up --detach sleeper && docker compose logs --follow sleeper'" 
