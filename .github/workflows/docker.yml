name: docker

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # lfs: the models/ onnx files live in LFS; a plain checkout (or the
      # default git build context) would bake pointer files into the image.
      - uses: actions/checkout@v5
        with:
          lfs: true
      # Layer cache lives in GHCR (:buildcache tag), not the GHA cache: the
      # torch/nemo layers far exceed the free 10GB GHA pool and its 7-day
      # eviction. mode=max exports every layer, so an unchanged uv.lock skips
      # the multi-GB dependency sync entirely. Cache export requires a
      # docker-container (buildx) builder; the default docker driver can't.
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
